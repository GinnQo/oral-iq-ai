version: '3.8'
services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: speaker_recognition
    ports:
      - '5432:5432'
    volumes:
      - speaker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  speaker:
    build:
      context: ./services/speaker-recognition
    environment:
      SR_DATABASE_URL: postgresql://postgres:postgres@db:5432/speaker_recognition
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '8000:8000'

volumes:
  speaker_pgdata:
