name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Speaker Service Tests
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.12
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r services/speaker-recognition/requirements.txt
      - run: python -m pip install pytest
      - run: pytest -q services/speaker-recognition/tests/test_embeddings.py
