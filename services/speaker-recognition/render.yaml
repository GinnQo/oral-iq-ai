services:
  - type: web_service
    name: speaker-recognition
    env: docker
    branch: main
    dockerfile_path: Dockerfile
    build_command: docker build -t speaker-recognition .
    start_command: uvicorn app.main:app --host 0.0.0.0 --port 10000
    env_vars:
      - key: SR_DATABASE_URL
        value: "${SR_DATABASE_URL}"
